# golangci-lint configuration
# Zwei-Schichten-Modell: siehe docs/developer-guide/CLEAN_CODE.md
#
# Schicht 1 (hart):  make lint        — blockiert CI
# Schicht 2 (weich): make lint-warn   — --exit-zero, zeigt Baustellen

run:
  timeout: 5m
  go: "1.22"

linters:
  disable-all: true
  enable:
    # ── Schicht 1 — Hart ────────────────────────────────────────────────────
    - errcheck        # verschluckte Fehler
    - govet           # compiler-nahe Korrektheit
    - staticcheck     # tote Pfade, falsche API-Nutzung
    - unused          # toter Code
    - gosimple        # unnötige Komplexität
    - gofmt           # Formatierung
    - goimports       # Import-Ordnung
    - misspell        # Tippfehler
    - bodyclose       # HTTP-Body-Leaks
    - noctx           # HTTP ohne Context

linters-settings:
  gofmt:
    simplify: true

  goimports:
    local-prefixes: github.com/cerberus8484/opensourcebackup

  misspell:
    locale: US

  errcheck:
    check-type-assertions: true
    check-blank: true

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
  exclude-rules:
    # Testdateien: errcheck für t.Cleanup und defer-Aufrufe lockern
    - path: "_test\\.go"
      linters: [errcheck]
      text: "Error return value of .* is not checked"
