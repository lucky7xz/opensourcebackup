# Auto-sync: merge master → main after every push to master.
name: Sync main with master

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  sync:
    name: Merge master into main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Merge master into main
        run: |
          git fetch origin
          git checkout main
          git merge origin/master --no-ff -m "chore: auto-sync main with master [skip ci]"
          git push origin main
